name: Sync & Release

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.check.outputs.new_tag }}
      upstream_tag: ${{ steps.check.outputs.upstream_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new upstream tag
        id: check
        run: |
          LATEST_UPSTREAM=$(git ls-remote --tags https://github.com/pbatard/rufus.git 'v*' | grep -oP 'refs/tags/\K(v[0-9]+\.[0-9]+)' | sort -V | tail -1)
          LATEST_FORK=$(git tag -l 'v*' --sort=-v:refname | head -1)
          echo "upstream_tag=$LATEST_UPSTREAM" >> $GITHUB_OUTPUT
          if [ -z "$LATEST_UPSTREAM" ]; then
            echo "new_tag=false" >> $GITHUB_OUTPUT
          elif [ -z "$LATEST_FORK" ]; then
            echo "new_tag=true" >> $GITHUB_OUTPUT
          else
            HIGHER=$(printf '%s\n' "$LATEST_FORK" "$LATEST_UPSTREAM" | sort -V | tail -1)
            if [ "$HIGHER" = "$LATEST_UPSTREAM" ] && [ "$LATEST_UPSTREAM" != "$LATEST_FORK" ]; then
              echo "new_tag=true" >> $GITHUB_OUTPUT
            else
              echo "new_tag=false" >> $GITHUB_OUTPUT
            fi
          fi

  merge-and-build:
    needs: check-upstream
    if: needs.check-upstream.outputs.new_tag == 'true'
    runs-on: windows-latest
    outputs:
      build_ok: ${{ steps.build.outputs.build_ok }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/pbatard/rufus.git
          git fetch upstream --tags --force

      - name: Merge upstream
        id: merge
        run: |
          git checkout main
          UPSTREAM_TAG="${{ needs.check-upstream.outputs.upstream_tag }}"
          git merge --no-edit "refs/tags/$UPSTREAM_TAG"
          echo "merge_ok=true" >> $GITHUB_OUTPUT

      - name: Build (Release x64)
        id: build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" 2>nul || call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" 2>nul || call "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          msbuild rufus.sln /p:Configuration=Release /p:Platform=x64 /v:minimal && (echo build_ok=true >> %GITHUB_OUTPUT%) || (echo build_ok=false >> %GITHUB_OUTPUT%)

      - name: Push merge & create release
        if: steps.build.outputs.build_ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin main
          UPSTREAM_TAG="${{ needs.check-upstream.outputs.upstream_tag }}"
          FORK_TAG="${UPSTREAM_TAG}-ruberoid"
          git tag "$FORK_TAG" -m "Rufus-RuBeRoID based on upstream $UPSTREAM_TAG"
          git push origin "$FORK_TAG"
          gh release create "$FORK_TAG" `
            --title "Rufus-RuBeRoID $FORK_TAG" `
            --notes "Автоматический релиз на основе [$UPSTREAM_TAG](https://github.com/pbatard/rufus/releases/tag/$UPSTREAM_TAG)." `
            "x64/Release/rufus.exe#Rufus-RuBeRoID-$FORK_TAG.exe"

      - name: Notify on build failure
        if: steps.build.outputs.build_ok == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_TAG="${{ needs.check-upstream.outputs.upstream_tag }}"
          gh issue create \
            --title "Сборка сломана после слияния $UPSTREAM_TAG" \
            --body "Слияние с upstream [$UPSTREAM_TAG](https://github.com/pbatard/rufus/releases/tag/$UPSTREAM_TAG) прошло, но сборка не удалась.

Вероятно, upstream изменил API, от которого зависит наш код в \`src/net.c\`, \`src/stdlg.c\` или \`src/rufus.h\`.

1. Соберите локально и исправьте ошибки
2. Запушьте: \`git push origin main\`
3. Запустите workflow вручную: Actions → Sync \& Release → Run workflow"
