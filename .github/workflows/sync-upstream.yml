name: Sync & Release

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  PROTECTED_FILES: "src/net.c src/stdlg.c src/rufus.h"

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.check.outputs.new_tag }}
      upstream_tag: ${{ steps.check.outputs.upstream_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for new upstream tag
        id: check
        run: |
          LATEST_UPSTREAM=$(git ls-remote --tags https://github.com/pbatard/rufus.git 'v*' | grep -oP 'refs/tags/\K(v[0-9]+\.[0-9]+)' | sort -V | tail -1)
          LATEST_FORK=$(git tag -l 'v*' --sort=-v:refname | head -1)
          echo "upstream_tag=$LATEST_UPSTREAM" >> $GITHUB_OUTPUT
          if [ -z "$LATEST_UPSTREAM" ]; then
            echo "new_tag=false" >> $GITHUB_OUTPUT
          elif [ -z "$LATEST_FORK" ]; then
            echo "new_tag=true" >> $GITHUB_OUTPUT
          else
            HIGHER=$(printf '%s\n' "$LATEST_FORK" "$LATEST_UPSTREAM" | sort -V | tail -1)
            if [ "$HIGHER" = "$LATEST_UPSTREAM" ] && [ "$LATEST_UPSTREAM" != "$LATEST_FORK" ]; then
              echo "new_tag=true" >> $GITHUB_OUTPUT
            else
              echo "new_tag=false" >> $GITHUB_OUTPUT
            fi
          fi

  merge-and-build:
    needs: check-upstream
    if: needs.check-upstream.outputs.new_tag == 'true'
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    outputs:
      build_ok: ${{ steps.build.outputs.build_ok }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/pbatard/rufus.git
          git fetch upstream --tags --force

      - name: Check upstream changes in protected files
        id: check_protected
        run: |
          UPSTREAM_TAG="${{ needs.check-upstream.outputs.upstream_tag }}"
          CHANGED=""
          for f in $PROTECTED_FILES; do
            if git diff --quiet "refs/tags/$UPSTREAM_TAG" -- "$f" 2>/dev/null; then
              echo "$f: no changes"
            else
              echo "$f: CHANGED upstream"
              CHANGED="$CHANGED $f"
            fi
          done
          if [ -n "$CHANGED" ]; then
            echo "Any protected files changed upstream? YES: $CHANGED"
            echo "upstream_changed=$CHANGED" >> $GITHUB_OUTPUT
          else
            echo "Any protected files changed upstream? NO"
            echo "upstream_changed=" >> $GITHUB_OUTPUT
          fi

      - name: Save upstream versions of protected files
        if: steps.check_protected.outputs.upstream_changed != ''
        run: |
          UPSTREAM_TAG="${{ needs.check-upstream.outputs.upstream_tag }}"
          for f in $PROTECTED_FILES; do
            git show "refs/tags/$UPSTREAM_TAG:$f" > "/tmp/upstream_$(echo $f | tr '/' '_')" 2>/dev/null || true
          done

      - name: Merge upstream
        id: merge
        run: |
          git checkout main
          UPSTREAM_TAG="${{ needs.check-upstream.outputs.upstream_tag }}"
          git merge --no-edit "refs/tags/$UPSTREAM_TAG"
          echo "merge_ok=true" >> $GITHUB_OUTPUT

      - name: Build (Release x64)
        id: build
        shell: pwsh
        run: |
          $msbuild = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -find MSBuild\Current\Bin\MSBuild.exe
          if (-not $msbuild) { $msbuild = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe" }
          Write-Host "MSBuild: $msbuild"
          & $msbuild rufus.sln /p:Configuration=Release /p:Platform=x64 /v:minimal
          if ($LASTEXITCODE -eq 0) { echo "build_ok=true" >> $env:GITHUB_OUTPUT } else { echo "build_ok=false" >> $env:GITHUB_OUTPUT }

      - name: Push merge & create release
        if: steps.build.outputs.build_ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git push origin main
          UPSTREAM_TAG="${{ needs.check-upstream.outputs.upstream_tag }}"
          FORK_TAG="${UPSTREAM_TAG}-ruberoid"
          git tag -f "$FORK_TAG" -m "Rufus-RuBeRoID based on upstream $UPSTREAM_TAG"
          git push -f origin "$FORK_TAG"
          gh release create "$FORK_TAG" --repo WestDvina/rufus-RuBeRoID \
            --title "Rufus-RuBeRoID $FORK_TAG" \
            --notes "Автоматический релиз на основе [$UPSTREAM_TAG](https://github.com/pbatard/rufus/releases/tag/$UPSTREAM_TAG)." \
            "x64/Release/rufus.exe#Rufus-RuBeRoID-$FORK_TAG.exe" || \
          gh release upload "$FORK_TAG" --repo WestDvina/rufus-RuBeRoID \
            "x64/Release/rufus.exe#Rufus-RuBeRoID-$FORK_TAG.exe" || true
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "parse_mode=Markdown" \
            -d "text=*✅ Rufus-RuBeRoID $FORK_TAG*%0A%0AНовый релиз на основе [$UPSTREAM_TAG](https://github.com/pbatard/rufus/releases/tag/$UPSTREAM_TAG)%0A[Скачать](https://github.com/WestDvina/rufus-RuBeRoID/releases/tag/$FORK_TAG)"

      - name: Notify on upstream changes in protected files
        if: always() && steps.check_protected.outputs.upstream_changed != '' && steps.build.outputs.build_ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          UPSTREAM_TAG="${{ needs.check-upstream.outputs.upstream_tag }}"
          CHANGED="${{ steps.check_protected.outputs.upstream_changed }}"
          gh issue create \
            --title "Upstream изменил защищённые файлы в $UPSTREAM_TAG" \
            --body "Релиз создан, но upstream изменил наши файлы. Проверьте: $CHANGED" || true
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "parse_mode=Markdown" \
            -d "text=*⚠️ Upstream изменил защищённые файлы в $UPSTREAM_TAG*%0A%0AFiles: \`$CHANGED\`%0AРелиз создан, но проверьте изменения в Issues репозитория" || true

      - name: Notify on build failure
        if: steps.build.outputs.build_ok == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          UPSTREAM_TAG="${{ needs.check-upstream.outputs.upstream_tag }}"
          gh issue create \
            --title "Сборка сломана после слияния $UPSTREAM_TAG" \
            --body "Слияние прошло, но сборка не удалась. Исправьте и запушьте в main." || true
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "parse_mode=Markdown" \
            -d "text=*❌ Сборка сломана после слияния $UPSTREAM_TAG*%0A%0AСмотри Issue в репозитории" || true
